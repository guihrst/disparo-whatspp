version:"3.7"
services:
  frontend:
    image:guhorst/dispatch-frontend:latest
    ports:
      -target:80
        published:8080
        protocol:tcp
    deploy:
      replicas:1
      restart_policy:
        condition:on-failure
  backend:
    image:guhorst/dispatch-backend:latest
    ports:
      -target:3000
        published:3000
        protocol:tcp
    deploy:
      replicas:1
      restart_policy:
        condition:on-failure
