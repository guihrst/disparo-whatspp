<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Envio - Disparo WhatsApp</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    .hidden { display: none; }
    label { display: block; margin-top: 10px; font-weight: bold; }
    input, textarea, select, button { width: 100%; padding: 8px; margin-top: 4px; }
    button { width: auto; cursor: pointer; }
    #log { background: #f4f4f4; padding: 10px; height: 200px; overflow-y: auto; margin-top: 20px; white-space: pre-wrap; }
    .inline-label { display: flex; align-items: center; margin-top: 10px; }
    .inline-label input { margin-left: 8px; width: auto; }
  </style>
</head>
<body>
  <h1>Envio - Disparo WhatsApp</h1>
  <div id="login">
    <label for="loginPwd">Senha:</label>
    <input type="password" id="loginPwd" placeholder="Digite sua senha">
    <button id="doLogin">Entrar</button>
    <div id="loginMsg" style="color:red; margin-top:10px;"></div>
  </div>
  <div id="main" class="hidden">
    <label class="inline-label"><span>Fechar conversa:</span><input type="checkbox" id="isClosed"></label>
    <label for="csvFile">Importar CSV (55+DDD+Número):</label>
    <input type="file" id="csvFile" accept=".csv">
    <label for="messageType">Tipo de envio:</label>
    <select id="messageType">
      <option value="text">Somente Texto</option>
      <option value="image_text">Texto + Imagem via URL</option>
    </select>
    <label id="labelText" for="messageText">Texto da Mensagem:</label>
    <textarea id="messageText" rows="4"></textarea>
    <div id="divImage" class="hidden">
      <label for="imageUrl">URL da Imagem:</label>
      <input type="url" id="imageUrl">
    </div>
    <label for="intervalSeconds">Intervalo (segundos):</label>
    <input type="number" id="intervalSeconds" min="0" value="0">
    <button id="sendBtn">Enviar</button>
    <pre id="log"></pre>
  </div>
  <script>
    const STATE_KEY = 'dispatchState';
    const LOGS_KEY = 'dispatchLogs';
    const FORM_KEY = 'dispatchForm';
    // redirect if not configured
    if (!localStorage.getItem('apiToken')) {
      alert('Configurações faltando.');
      window.location.href = 'config.html';
    }
    // load form and state on DOMContent
    document.addEventListener('DOMContentLoaded', () => {
      loadForm();
      loadLogs();
      const state = JSON.parse(localStorage.getItem(STATE_KEY) || 'null');
      if (state && state.numbers && state.currentIndex < state.numbers.length) {
        if (confirm('Envio em andamento detectado. Deseja continuar?')) {
          showMain();
          resumeDispatch();
        }
      }
    });
    document.getElementById('doLogin').addEventListener('click', () => {
      const pwd = document.getElementById('loginPwd').value;
      if (pwd === localStorage.getItem('accessPwd')) {
        showMain();
      } else {
        document.getElementById('loginMsg').textContent = 'Senha incorreta.';
      }
    });
    function showMain() {
      document.getElementById('login').classList.add('hidden');
      document.getElementById('main').classList.remove('hidden');
    }
    // form persistence
    ['messageType','messageText','imageUrl','intervalSeconds','isClosed'].forEach(id => {
      const el = document.getElementById(id);
      el.addEventListener('change', saveForm);
      el.addEventListener('input', saveForm);
    });
    function saveForm() {
      const form = {
        isClosed: document.getElementById('isClosed').checked,
        messageType: document.getElementById('messageType').value,
        messageText: document.getElementById('messageText').value,
        imageUrl: document.getElementById('imageUrl').value,
        intervalSeconds: parseInt(document.getElementById('intervalSeconds').value,10) || 0
      };
      localStorage.setItem(FORM_KEY, JSON.stringify(form));
      updateFields();
    }
    function loadForm() {
      const form = JSON.parse(localStorage.getItem(FORM_KEY) || '{}');
      if (form.messageType) {
        document.getElementById('isClosed').checked = form.isClosed;
        document.getElementById('messageType').value = form.messageType;
        document.getElementById('messageText').value = form.messageText || '';
        document.getElementById('imageUrl').value = form.imageUrl || '';
        document.getElementById('intervalSeconds').value = form.intervalSeconds || 0;
      }
      updateFields();
    }
    function updateFields() {
      const type = document.getElementById('messageType').value;
      const div = document.getElementById('divImage');
      const label = document.getElementById('labelText');
      if (type === 'text') {
        div.classList.add('hidden');
        label.textContent = 'Texto da Mensagem:';
      } else {
        div.classList.remove('hidden');
        label.textContent = 'Texto + Legenda:';
      }
    }
    function loadLogs() {
      const logs = JSON.parse(localStorage.getItem(LOGS_KEY) || '[]');
      document.getElementById('log').textContent = logs.join('\n');
    }
    document.getElementById('sendBtn').addEventListener('click', () => {
      const file = document.getElementById('csvFile').files[0];
      if (!file) return alert('Selecione um CSV.');
      const token = localStorage.getItem('apiToken');
      const endpoint = localStorage.getItem('apiEndpoint').replace(/\/+$/,'');
      const externalKey = localStorage.getItem('externalKey');
      const { isClosed, messageType, messageText, imageUrl, intervalSeconds } = JSON.parse(localStorage.getItem(FORM_KEY) || '{}');
      Papa.parse(file, { header:false, skipEmptyLines:true,
        complete(results) {
          const numbers = results.data.map(r => Array.isArray(r)?r[0].trim():r.trim()).filter(n=>n);
          const state = { numbers, currentIndex:0, isClosed, messageType, messageText, imageUrl, intervalSeconds, token, endpoint, externalKey };
          localStorage.setItem(STATE_KEY, JSON.stringify(state));
          localStorage.setItem(LOGS_KEY, JSON.stringify([]));
          showMain(); resumeDispatch();
        },
        error(e){ alert('Erro CSV: '+e.message); }
      });
    });
    function resumeDispatch() {
      const state = JSON.parse(localStorage.getItem(STATE_KEY));
      const logs = JSON.parse(localStorage.getItem(LOGS_KEY) || '[]');
      if (state.currentIndex >= state.numbers.length) {
        alert('Envio concluído.');
        localStorage.removeItem(STATE_KEY);
        return;
      }
      const number = state.numbers[state.currentIndex];
      sendMsg(number, state).then(success => {
        logs.push(`[${number}] -> ${success?'Enviado':'Erro'}`);
        localStorage.setItem(LOGS_KEY, JSON.stringify(logs));
        document.getElementById('log').textContent = logs.join('\n');
        state.currentIndex++;
        localStorage.setItem(STATE_KEY, JSON.stringify(state));
        setTimeout(resumeDispatch, state.intervalSeconds*1000);
      });
    }
    function sendMsg(number, state) {
      const url = state.messageType==='text'?state.endpoint:state.endpoint+'/url';
      const body = { number, externalKey: state.externalKey, isClosed: state.isClosed, body: state.messageText };
      if (state.messageType==='image_text') body.mediaUrl = state.imageUrl;
      return fetch(url, {
        method:'POST',
        headers:{ 'Authorization':'Bearer '+state.token, 'Content-Type':'application/json' },
        body:JSON.stringify(body)
      }).then(resp => resp.ok);
    }
  </script>
</body>
</html>
