<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Envio - Disparo WhatsApp</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    .hidden { display: none; }
    label { display: block; margin-top: 10px; font-weight: bold; }
    input, textarea, select, button { width: 100%; padding: 8px; margin-top: 4px; }
    button { width: auto; cursor: pointer; }
    #log { background: #f4f4f4; padding: 10px; height: 200px; overflow-y: auto; margin-top: 20px; white-space: pre-wrap; }
    .inline-label { display: flex; align-items: center; margin-top: 10px; }
    .inline-label input { margin-left: 8px; width: auto; }
  </style>
</head>
<body>
  <h1>Envio - Disparo WhatsApp</h1>
  <div id="login">
    <label for="loginPwd">Senha:</label>
    <input type="password" id="loginPwd" placeholder="Digite sua senha">
    <button id="doLogin">Entrar</button>
    <div id="loginMsg" style="color:red; margin-top:10px;"></div>
  </div>
  <div id="main" class="hidden">
    <label class="inline-label">
      <span>Fechar conversa:</span>
      <input type="checkbox" id="isClosed">
    </label>
    <label for="csvFile">Importar CSV:</label>
    <input type="file" id="csvFile" accept=".csv">
    <label for="messageType">Tipo de envio:</label>
    <select id="messageType">
      <option value="text">Somente Texto</option>
      <option value="image_text">Texto + Imagem via URL</option>
    </select>
    <label id="labelText" for="messageText">Texto da Mensagem:</label>
    <textarea id="messageText" rows="4"></textarea>
    <div id="divImage" class="hidden">
      <label for="imageUrl">URL da Imagem:</label>
      <input type="url" id="imageUrl">
    </div>
    <label for="intervalSeconds">Intervalo (segundos):</label>
    <input type="number" id="intervalSeconds" min="0" value="0">
    <button id="sendBtn">Enviar</button>
    <pre id="log"></pre>
  </div>
  <script>
    if (!localStorage.getItem('apiToken')) {
      alert('Configurações faltando.');
      window.location.href = 'config.html';
    }
    document.getElementById('doLogin').addEventListener('click', () => {
      if (document.getElementById('loginPwd').value === localStorage.getItem('accessPwd')) {
        document.getElementById('login').classList.add('hidden');
        document.getElementById('main').classList.remove('hidden');
      } else {
        document.getElementById('loginMsg').textContent = 'Senha incorreta.';
      }
    });
    document.getElementById('messageType').addEventListener('change', () => {
      const div = document.getElementById('divImage');
      const label = document.getElementById('labelText');
      if (document.getElementById('messageType').value === 'text') {
        div.classList.add('hidden');
        label.textContent = 'Texto da Mensagem:';
      } else {
        div.classList.remove('hidden');
        label.textContent = 'Texto + Legenda:';
      }
    });
    document.getElementById('sendBtn').addEventListener('click', () => {
      const file = document.getElementById('csvFile').files[0];
      const token = localStorage.getItem('apiToken');
      const endpoint = localStorage.getItem('apiEndpoint').replace(/\/+$/, '');
      const externalKey = localStorage.getItem('externalKey');
      const isClosed = document.getElementById('isClosed').checked;
      const type = document.getElementById('messageType').value;
      const text = document.getElementById('messageText').value.trim();
      const imageUrl = document.getElementById('imageUrl').value.trim();
      const interval = parseInt(document.getElementById('intervalSeconds').value,10)||0;
      Papa.parse(file, {
        header:false, skipEmptyLines:true,
        complete(results) {
          results.data.forEach((r,i) => {
            const number = Array.isArray(r)?r[0].trim():r.trim();
            setTimeout(() => {
              fetch(type==='text'?endpoint:endpoint+'/url', {
                method:'POST',
                headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},
                body:JSON.stringify({number,externalKey,isClosed,body:text, ...(type==='image_text'&&{mediaUrl:imageUrl})})
              }).then(res=>res.json()).then(result=>{
                document.getElementById('log').textContent+=`[${number}] -> ${result.success||res.ok?'Enviado':'Erro:'+JSON.stringify(result)}\n`;
              }).catch(err=>{
                document.getElementById('log').textContent+=`[${number}] -> Falha: ${err.message}\n`;
              });
            }, i*interval*1000);
          });
        },
        error(e){alert('Erro CSV: '+e.message);}
      });
    });
  </script>
</body>
</html>
