<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Envio - Disparo WhatsApp</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    .hidden { display: none; }
    label { display: block; margin-top: 10px; font-weight: bold; }
    input, textarea, select, button { width: 100%; padding: 8px; margin-top: 4px; }
    button { width: auto; cursor: pointer; }
    #log { background: #f4f4f4; padding: 10px; height: 200px; overflow-y: auto; margin-top: 20px; white-space: pre-wrap; }
    .inline-label { display: flex; align-items: center; margin-top: 10px; }
    .inline-label input { margin-left: 8px; width: auto; }
  </style>
</head>
<body>
  <h1>Envio - Disparo WhatsApp</h1>
  
  <div id="login">
    <label for="loginPwd">Senha:</label>
    <input type="password" id="loginPwd" placeholder="Digite sua senha">
    <button id="doLogin">Entrar</button>
    <div id="loginMsg" style="color:red; margin-top:10px;"></div>
  </div>
  
  <div id="main" class="hidden">
    <label class="inline-label">
      <span>Fechar conversa (isClosed):</span>
      <input type="checkbox" id="isClosed">
    </label>
    
    <label for="csvFile">Importar CSV (números 55+DDD+Número):</label>
    <input type="file" id="csvFile" accept=".csv">
    
    <label for="messageType">Tipo de envio:</label>
    <select id="messageType">
      <option value="text">Somente Texto</option>
      <option value="image_text">Texto + Imagem via URL</option>
    </select>
    
    <label id="labelText" for="messageText">Texto da Mensagem:</label>
    <textarea id="messageText" rows="4"></textarea>
    
    <div id="divImage" class="hidden">
      <label for="imageUrl">URL da Imagem:</label>
      <input type="url" id="imageUrl">
    </div>
    
    <label for="intervalSeconds">Intervalo (segundos):</label>
    <input type="number" id="intervalSeconds" min="0" value="0">
    
    <button id="sendBtn">Enviar</button>
    
    <pre id="log"></pre>
  </div>
  
  <script>
    if (!localStorage.getItem('apiToken')) {
      alert('Configurações não encontradas. Você será redirecionado.');
      window.location.href = 'config.html';
    }
    const loginDiv = document.getElementById('login');
    const mainDiv = document.getElementById('main');
    document.getElementById('doLogin').addEventListener('click', () => {
      const pwd = document.getElementById('loginPwd').value;
      if (pwd === localStorage.getItem('accessPwd')) {
        loginDiv.classList.add('hidden');
        mainDiv.classList.remove('hidden');
      } else {
        document.getElementById('loginMsg').textContent = 'Senha incorreta.';
      }
    });
    
    const typeEl = document.getElementById('messageType');
    const divImage = document.getElementById('divImage');
    const labelText = document.getElementById('labelText');
    typeEl.addEventListener('change', () => {
      if (typeEl.value === 'text') {
        divImage.classList.add('hidden');
        labelText.textContent = 'Texto da Mensagem:';
      } else {
        divImage.classList.remove('hidden');
        labelText.textContent = 'Texto + Legenda:';
      }
    });
    
    function sendMsg(number, payload) {
      let logEntry = `[${number}] -> `;
      fetch(payload.url, {
        method: 'POST',
        headers: {'Authorization': 'Bearer ' + payload.token, 'Content-Type': 'application/json'},
        body: JSON.stringify(payload.body)
      })
      .then(res => res.json().then(result => {
        logEntry += (result.success || res.ok) ? 'Enviado' : 'Erro: ' + JSON.stringify(result);
        document.getElementById('log').textContent += logEntry + '\n';
      }))
      .catch(err => {
        logEntry += 'Falha: ' + err.message;
        document.getElementById('log').textContent += logEntry + '\n';
      });
    }
    
    function sendAll() {
      const file = document.getElementById('csvFile').files[0];
      const token = localStorage.getItem('apiToken');
      const endpoint = localStorage.getItem('apiEndpoint').replace(/\/+$/, '');
      const externalKey = localStorage.getItem('externalKey');
      const isClosed = document.getElementById('isClosed').checked;
      const type = typeEl.value;
      const text = document.getElementById('messageText').value.trim();
      const imageUrl = document.getElementById('imageUrl').value.trim();
      const interval = parseInt(document.getElementById('intervalSeconds').value, 10) || 0;
      
      Papa.parse(file, {
        header: false, skipEmptyLines: true,
        complete(results) {
          const numbers = results.data.map(r => Array.isArray(r) ? r[0].trim() : r.trim()).filter(n => n);
          numbers.reduce((p, number, idx) => p.then(() => new Promise(resolve => {
            sendMsg(number, {
              url: type === 'text' ? endpoint : endpoint + '/url',
              token,
              body: { number, externalKey, isClosed, body: text, ...(type === 'image_text' && { mediaUrl: imageUrl }) }
            });
            setTimeout(resolve, interval * 1000);
          })), Promise.resolve());
        },
        error(e) { alert('Erro ao processar CSV: ' + e.message); }
      });
    }
    document.getElementById('sendBtn').addEventListener('click', sendAll);
  </script>
</body>
</html>
