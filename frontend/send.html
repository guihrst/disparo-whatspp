<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Envio – Disparo WhatsApp</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    .hidden { display: none; }
    .inline-label { display: flex; align-items: center; margin-top: 10px; }
    .inline-label span { margin-right: 8px; }
    label { display: block; margin-top: 10px; font-weight: bold; }
    input, textarea, select, button { width: 100%; padding: 8px; margin-top: 4px; }
    button { width: auto; cursor: pointer; }
    #log { background: #f4f4f4; padding: 10px; height: 200px; overflow-y: auto; white-space: pre-wrap; margin-top: 20px; }
  </style>
</head>
<body>
  <h1>Envio – Disparo WhatsApp</h1>
  <div id="login">
    <label for="loginPwd">Senha de Acesso:</label>
    <input type="password" id="loginPwd" placeholder="Digite a senha mestra">
    <button id="doLogin">Entrar</button>
    <div id="loginMsg" style="color:red; margin-top:10px;"></div>
  </div>
  <div id="main" class="hidden">
    <div class="inline-label"><span>Fechar conversa (isClosed):</span><input type="checkbox" id="isClosed"></div>
    <label for="csvFile">Importar CSV:</label><input type="file" id="csvFile" accept=".csv">
    <label for="messageType">Tipo de envio:</label>
    <select id="messageType"><option value="text">Somente Texto</option><option value="image_text">Texto + Imagem</option></select>
    <label id="labelText" for="messageText">Texto da Mensagem:</label><textarea id="messageText" rows="4"></textarea>
    <div id="divImage" class="hidden"><label for="imageUrl">URL da Imagem:</label><input type="url" id="imageUrl"></div>
    <label for="intervalSeconds">Intervalo (s):</label><input type="number" id="intervalSeconds" min="0" value="0">
    <button id="sendBtn">Enviar</button>
    <pre id="log"></pre>
  </div>
  <script>
    const backendUrl = localStorage.getItem('backendUrl');
    document.getElementById('doLogin').onclick = () => {
      fetch(backendUrl + '/auth', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ password: document.getElementById('loginPwd').value })
      })
      .then(r => {
        if (r.ok) { document.getElementById('login').classList.add('hidden'); document.getElementById('main').classList.remove('hidden'); }
        else document.getElementById('loginMsg').textContent = 'Senha incorreta.';
      });
    };
    // dispatch logic unchanged...
  </script>
</body>
</html>
