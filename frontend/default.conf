server {
  listen 80 default_server;
  listen [::]:80 default_server;

  # Aceita qualquer host
  server_name _;

  # Diretório de arquivos estáticos
  root /usr/share/nginx/html;

  # Prioridade de arquivos index
  index send.html logs.html config.html index.html;

  # Serve apenas arquivos existentes, 404 caso contrário
  location / {
    try_files $uri $uri/ =404;
  }

  # Garante que .html seja servido corretamente
  location ~* \.html$ {
    try_files $uri =404;
  }
}