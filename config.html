<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Configurações - Disparo WhatsApp</title>
  <style>body{font-family:Arial;margin:20px;}label{display:block;margin-top:10px;font-weight:bold;}input{width:100%;padding:8px;margin-top:4px;}button{margin-top:15px;padding:10px 20px;font-size:16px;cursor:pointer;}</style>
</head>
<body>
  <h1>Configurações</h1>
  <label for="cfgToken">Token (Bearer):</label><input type="text" id="cfgToken" placeholder="JWT">
  <label for="cfgEndpoint">API URL (sem /url):</label><input type="text" id="cfgEndpoint" placeholder="https://api...">
  <label for="cfgExternalKey">ExternalKey:</label><input type="text" id="cfgExternalKey" placeholder="Chave">
  <label for="cfgPassword">Senha:</label><input type="password" id="cfgPassword">
  <button id="saveBtn">Salvar</button>
  <script>
    document.getElementById('saveBtn').addEventListener('click', () => {
      const t=document.getElementById('cfgToken').value, e=document.getElementById('cfgEndpoint').value, k=document.getElementById('cfgExternalKey').value, p=document.getElementById('cfgPassword').value;
      if(!t||!e||!k||!p) return alert('Preencha tudo');
      localStorage.setItem('apiToken',t);localStorage.setItem('apiEndpoint',e.replace(/\/+$/,''));localStorage.setItem('externalKey',k);localStorage.setItem('accessPwd',p);
      window.location.href='send.html';
    });
  </script>
</body>
</html>
