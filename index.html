<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Disparo de WhatsApp - MyChatBot</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    .hidden { display: none; }
    label { display: block; margin-top: 10px; font-weight: bold; }
    input, textarea, select { width: 100%; padding: 8px; margin-top: 4px; }
    button { margin-top: 15px; padding: 10px 20px; font-size: 16px; cursor: pointer; }
    #log { background: #f4f4f4; padding: 10px; height: 200px; overflow-y: auto; white-space: pre-wrap; margin-top: 20px; }
    .inline-label { display: flex; align-items: center; margin-top: 10px; font-weight: bold; }
    .inline-label input[type="checkbox"] { margin-left: 8px; width: auto; }
  </style>
</head>
<body>
  <h1>Disparo de WhatsApp - MyChatBot</h1>

  <!-- Configurações -->
  <div id="settings">
    <h2>Configurações</h2>
    <label for="cfgToken">Token da API (Bearer):</label>
    <input type="text" id="cfgToken" placeholder="Insira seu JWT">
    <label for="cfgEndpoint">URL da API (sem /url):</label>
    <input type="text" id="cfgEndpoint" placeholder="https://api.mychatbot.com.br/v2/api/external/ID">
    <label for="cfgExternalKey">Chave Externa (externalKey):</label>
    <input type="text" id="cfgExternalKey" placeholder="ID_UNICA_DO_SISTEMA_CLIENTE">
    <label for="cfgPassword">Senha de acesso:</label>
    <input type="password" id="cfgPassword" placeholder="Defina uma senha">
    <button id="saveSettings">Salvar Configurações</button>
  </div>

  <!-- Login -->
  <div id="login" class="hidden">
    <h2>Login</h2>
    <label for="loginPassword">Senha:</label>
    <input type="password" id="loginPassword" placeholder="Digite a senha">
    <button id="doLogin">Entrar</button>
    <div id="loginMsg" style="color:red; margin-top:10px;"></div>
  </div>

  <!-- Main -->
  <div id="main" class="hidden">
    <label class="inline-label" for="isClosed">
      Fechar conversa após envio (isClosed)
      <input type="checkbox" id="isClosed">
    </label>
    <label for="csvFile">Importar CSV (números 55+DDD+Número):</label>
    <input type="file" id="csvFile" accept=".csv">
    <label for="messageType">Tipo de envio:</label>
    <select id="messageType">
      <option value="text">Somente Texto</option>
      <option value="image_text">Texto + Imagem via URL</option>
    </select>
    <label id="labelText" for="messageText">Texto da Mensagem:</label>
    <textarea id="messageText" rows="4" placeholder="Digite sua mensagem aqui"></textarea>
    <div id="divImage" class="hidden">
      <label for="imageUrl">URL da Imagem:</label>
      <input type="url" id="imageUrl" placeholder="https://exemplo.com/imagem.png">
    </div>
    <label for="intervalSeconds">Intervalo entre envios (segundos):</label>
    <input type="number" id="intervalSeconds" min="0" placeholder="Ex: 5">
    <button id="sendBtn">Enviar</button>
    <pre id="log"></pre>
  </div>

  <script>
    // Saved settings / login logic...
  </script>
</body>
</html>
