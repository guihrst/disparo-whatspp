version: "3.8"
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    volumes:
      - job_data:/app/data
    ports:
      - "3000:3000"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8080:80"
    restart: unless-stopped

volumes:
  job_data:
